# === Configuración de deploy de Nexus ===
# Sirve para deploy por drag-and-drop Y por conexión con Git (recomendado).
# El sitio es 100% estático, sin build.

[build]
  publish = "."
  command = ""

# === Funciones serverless (Ola 2) ===
# Proxy seguro de tokens de Meta/e-commerce. Sin dependencias npm (solo módulos
# nativos de Node), así el deploy por drag-and-drop las empaqueta con esbuild.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# === Cabeceras de seguridad (Ola 0 de la auditoría) ===
# Aplicadas a todas las rutas.
[[headers]]
  for = "/*"
  [headers.values]
    # no-referrer: evita que el access_token de Meta (que hoy viaja en la URL)
    # se filtre a terceros por la cabecera Referer. Clave hasta mover a proxy (Ola 2).
    Referrer-Policy = "no-referrer"

    # Anti-clickjacking: nadie puede embeber el dashboard en un iframe.
    X-Frame-Options = "DENY"

    # Evita que el navegador "adivine" tipos MIME (vector de XSS).
    X-Content-Type-Options = "nosniff"

    # Fuerza HTTPS en visitas futuras.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

    # Apaga APIs del navegador que Nexus no usa.
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), usb=(), payment=()"

    # CSP: bloquea scripts inyectados (XSS) y el embebido en iframes.
    # Nota: 'unsafe-inline' sigue permitido para el script/estilos inline actuales;
    # endurecer con hashes/nonces es una mejora posterior.
    # connect-src APRETADO (Ola 2): el navegador ya NO llama a Meta ni a los
    # endpoints de e-commerce (lo hacen las funciones serverless). Solo necesita
    # 'self' (las funciones + el sitio) y *.googleapis.com (Auth + Firestore).
    # ⚠️ Si tras deployar el login de Firebase fallara, revertir connect-src a
    #    "'self' https:" y avisar (algún dominio de Firebase quedó fuera).
    # script-src permite gstatic.com (SDK de Firebase). frame-src permite el iframe
    # de Firebase Auth (authDomain) que usa para persistir/propagar la sesión.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://www.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.googleapis.com; frame-src 'self' https://nexus-systems-17a5b.firebaseapp.com https://accounts.google.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"
